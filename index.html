<!doctype html>
<html lang="it" translate="no" class="notranslate">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="google" content="notranslate">
    <meta name="format-detection" content="telephone=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="The Hobbit">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>The Hobbit</title>
    <style>
      html,
      body {
        margin: 0;
        background: #090a08;
        overflow: hidden;
      }

      body.booting .game-shell {
        opacity: 0;
        pointer-events: none;
      }

    </style>
    <link rel="stylesheet" href="style.css?v=20260615-1625">
  </head>
  <body class="booting notranslate" translate="no">
    <div id="layout-switch" class="layout-switch" aria-label="Layout">
      <span class="layout-switch__label">Layout</span>
      <div class="layout-switch__buttons" role="group" aria-label="Choose layout">
        <button id="layout-mode-1" type="button">1</button>
        <button id="layout-mode-2" type="button">2</button>
      </div>
    </div>
    <main id="game-shell" class="game-shell">
      <section class="scene" aria-label="Current location">
        <img id="room-image" src="assets/local-images/hobbit_hole.jpeg" alt="Hobbit_hole">
        <div id="image-reveal" class="image-reveal" aria-hidden="true" hidden>
          <img id="image-reveal-outline" class="image-reveal-outline" alt="">
          <img id="image-reveal-fill" class="image-reveal-fill" alt="">
        </div>
        <div id="scene-map-overlay" class="scene-map-overlay" aria-hidden="true" hidden>
          <img id="scene-map-image" alt="Map of the game world">
        </div>
        <div id="scene-compass" class="scene-compass" aria-hidden="true" hidden>
          <div id="scene-compass-rose" class="scene-compass__rose">
            <span id="scene-compass-north" class="scene-compass__point scene-compass__point--north" data-active="false">N</span>
            <span id="scene-compass-north-east" class="scene-compass__point scene-compass__point--north-east" data-active="false">NE</span>
            <span id="scene-compass-east" class="scene-compass__point scene-compass__point--east" data-active="false">E</span>
            <span id="scene-compass-south-east" class="scene-compass__point scene-compass__point--south-east" data-active="false">SE</span>
            <span id="scene-compass-south" class="scene-compass__point scene-compass__point--south" data-active="false">S</span>
            <span id="scene-compass-south-west" class="scene-compass__point scene-compass__point--south-west" data-active="false">SW</span>
            <span id="scene-compass-west" class="scene-compass__point scene-compass__point--west" data-active="false">W</span>
            <span id="scene-compass-north-west" class="scene-compass__point scene-compass__point--north-west" data-active="false">NW</span>
            <span class="scene-compass__center" aria-hidden="true"></span>
          </div>
          <div id="scene-compass-vertical" class="scene-compass__vertical" hidden>
            <span id="scene-compass-up" class="scene-compass__vertical-label" data-active="false" hidden>Up</span>
            <span id="scene-compass-down" class="scene-compass__vertical-label" data-active="false" hidden>Dn</span>
          </div>
        </div>
        <audio id="music-player" preload="none"></audio>
      </section>

      <div id="layout-divider" class="layout-divider" role="separator" aria-orientation="vertical" aria-label="Resize layout"></div>

      <section class="console" aria-label="Game console">
        <div id="output" class="output" aria-live="polite"></div>
        <form id="command-form" class="command-form">
          <label for="command-input">&gt;</label>
          <input id="command-input" name="command" autocomplete="off" spellcheck="false" autofocus>
        </form>
      </section>

      <aside class="sidebar" aria-label="Status">
        <section>
          <h2>Inventory</h2>
          <p id="inventory-status" class="inventory-status">Weight 0/0</p>
          <ul id="inventory-list"></ul>
        </section>
        <section>
          <h2>Exits</h2>
          <ul id="exits-list"></ul>
        </section>
        <section>
          <h2>People</h2>
          <ul id="people-list"></ul>
        </section>
      </aside>
    </main>

    <div id="save-panel" class="save-panel" hidden>
      <button id="save-panel-backdrop" class="save-panel__backdrop" type="button" aria-label="Close safe moments panel"></button>
      <section class="save-panel__dialog" role="dialog" aria-modal="true" aria-labelledby="save-panel-title">
        <header class="save-panel__header">
          <h2 id="save-panel-title" class="save-panel__title">Safe Moments</h2>
          <button id="save-panel-close" class="save-panel__close" type="button" aria-label="Close">Close</button>
        </header>

        <div class="save-panel__body">
          <section class="save-panel__lists">
            <div class="save-panel__actions">
              <button id="save-panel-latest-autosave" class="save-panel__button save-panel__button--primary" type="button">Resume Latest</button>
            </div>
            <div class="save-panel__list-block">
              <div id="save-panel-autosave-list" class="save-panel__list" role="list"></div>
            </div>
          </section>
        </div>
      </section>
    </div>

    <script src="assets/game-data.js?v=20260615-1625"></script>
    <script src="game.js?v=20260615-1625"></script>
  </body>
</html>
